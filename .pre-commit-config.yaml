# Check out https://pre-commit.com/ for documentation.
minimum_pre_commit_version: 4.5.0

# Set the default stages for hooks that don't specify `stages`.
# If we didn't set this, the defaults would be all 10 stages.
# See https://pre-commit.com/#confining-hooks-to-run-at-certain-stages
# Stages (https://pre-commit.com/#supported-git-hooks):
#   commit-msg
#   | prepare-commit-msg
#   | pre-(commit|merge-commit|push|rebase)
#   | post-(checkout|commit|merge|rewrite)
default_stages:
  - pre-commit
  - pre-push
  - manual

repos:
  # Standard hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args:
          - --maxkb=256
      - id: forbid-new-submodules # ban Git submodules
      - id: check-case-conflict # ban ABC and abc both existing
      - id: check-illegal-windows-names # ban filenames that are illegal on Windows
      - id: check-merge-conflict # ban merge conflict markers
        # Use our `default_stages` -- both merge and rebase trigger pre-commit at the right time.
        args:
          - --assume-in-merge # otherwise skipped in rebase
      - id: check-symlinks # ban *broken* symlinks
      - id: check-shebang-scripts-are-executable # ensures all shebangs are executable
      - id: end-of-file-fixer # auto-add final \n
      - id: fix-byte-order-marker # auto-remove BOMs
      - id: trailing-whitespace # auto-remove end-of-line whitespace

  - repo: local
    hooks:
      - id: check-filenames
        name: Enforce file and directory naming conventions.
        entry: >-
          Path components may only use 'A-Za-z0-9_.,~+=-',
          cannot start with `~` or '-',
          and cannot end with `~` or '.'.
        language: fail
        files: '[^/\w.,~+=-]|(^|/)[~-]|[~.]($|/)'
      - id: pathvalidate
        name: Verify that paths are valid cross-platform.
        entry: pathvalidate --max-len 255 validate --
        language: python
        additional_dependencies:
          - pathvalidate-cli

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.1
    hooks:
      - id: check-github-actions
      - id: check-github-workflows
      - id: check-compose-spec
      - id: check-metaschema
        files: \.schemas/.*\.(yaml|yml|json)$

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args:
          - --strict
          - --config-data
          - |
            rules:
              anchors:
                forbid-undeclared-aliases: true
                forbid-duplicated-anchors: true
                forbid-unused-anchors: true
              float-values:
                require-numeral-before-decimal: true
                forbid-scientific-notation: true
                forbid-nan: true
                forbid-inf: true
              key-duplicates:
                forbid-duplicated-merge-keys: true
              octal-values:
                forbid-implicit-octal: true
                forbid-explicit-octal: true

  # UV lock and sync
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.7
    hooks:
      - id: uv-sync
        args: # overrides default of `--locked`
          - --all-extras

  # Format and lint Python with Ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args:
          - --fix-only
          - --show-fixes
      - id: ruff-format

  # Format Justfile
  - repo: local
    hooks:
      - id: format-justfile
        name: Format the justfile using 'just --fmt'.
        entry: just --fmt --unstable
        pass_filenames: false
        language: system
        files: justfile

  # Format and auto-fix various files with Biome.
  # Note that Biome's support for Markdown is pending.
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.13 # Note: biomejs/pre-commit only uses tags, not releases.
    hooks:
      # "check" hook -- auto-format and auto-fix
      - id: biome-check
        args:
          - --vcs-enabled=false # pre-commit is sending the file list already.
      # Manual "format" hook -- formats
      - id: biome-format
        args:
          - --vcs-enabled=false
        stages: # Omit `pre-commit` stage because `biome-check` includes all behavior.
          - manual
      # Manual "lint" hook -- auto-fixes
      - id: biome-lint
        args:
          - --vcs-enabled=false
        stages:
          - manual
      # Manual "ci" hook -- doesn't apply changes
      - id: biome-ci
        args:
          - --error-on-warnings # Otherwise returns 0 on lint rule violations.
          - --vcs-enabled=false
        stages:
          - manual

  - repo: https://github.com/tcort/markdown-link-check
    rev: v3.14.2
    hooks:
      - id: markdown-link-check
        args:
          - --quiet
        stages:
          - manual
