# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

minimum_pre_commit_version = "4.5.0"
# Set the default stages for hooks that don't specify `stages`.
# If we didn't set this, the defaults would be all 10 stages:
#   commit-msg
#   | prepare-commit-msg
#   | pre-(commit|merge-commit|push|rebase)
#   | post-(checkout|commit|merge|rewrite)
default_stages = [
  "pre-commit",
  "pre-push",
  "manual"
]

# Built-in Prek hooks
[[repos]]
repo = "builtin"
hooks = [
  {
    id = "check-added-large-files",
    args = [
      "--maxkb=256"
    ]
  },
  {
    id = "forbid-new-submodules"
  },
  {
    id = "check-case-conflict"
  },
  {
    id = "check-illegal-windows-names"
  },
  {
    # Use our `default_stages`: Both merge and rebase trigger prek at the right time.
    id = "check-merge-conflict",
    args = [
      "--assume-in-merge"  # otherwise would be skipped if rebasing.
    ]
  },
  {
    id = "detect-private-key"
  },
  {
    id = "check-symlinks"
  },
  {
    id = "check-shebang-scripts-are-executable"
  },
  {
    id = "end-of-file-fixer"
  },
  {
    id = "fix-byte-order-marker"
  },
  {
    id = "trailing-whitespace"
  }
]

# Check filenames are ok.
[[repos]]
repo = "local"
hooks = [
  {
    id = "check-filenames",
    name = "Enforce file and directory naming conventions.",
    entry = """
    Path components \
    may only use 'A-Za-z0-9_.,~+=-', \
    cannot start with `~` or '-', \
    and cannot end with `~` or '.'.\
    """,
    language = "fail",
    files = '[^/\w.,~+=-]|(^|/)[~-]|[~.]($|/)'
  },
  {
    id = "pathvalidate",
    name = "Verify that paths are valid cross-platform.",
    entry = "pathvalidate --max-len 255 validate --",
    language = "python",
    additional_dependencies = [
      "pathvalidate-cli"
    ]
  }
]

# Validate JSON files agianst JSON Schemas.
[[repos]]
repo = "https://github.com/python-jsonschema/check-jsonschema"
rev = "0.37.2"
hooks = [
  {
    id = "check-github-actions"
  },
  {
    id = "check-github-workflows"
  },
  {
    id = "check-compose-spec"
  },
  {
    id = "check-metaschema",
    files = '\.schemas/.*\.(yaml|yml|json)$'
  }
]

# Lint YAML.
[[repos]]
repo = "https://github.com/adrienverge/yamllint"
rev = "v1.38.0"
hooks = [
  {
    id = "yamllint",
    args = [
      "--strict",
      "--config-data",
      """
rules:
  anchors:
    forbid-undeclared-aliases: true
    forbid-duplicated-anchors: true
    forbid-unused-anchors: true
  float-values:
    require-numeral-before-decimal: true
    forbid-scientific-notation: true
    forbid-nan: true
    forbid-inf: true
  key-duplicates:
    forbid-duplicated-merge-keys: true
  octal-values:
    forbid-implicit-octal: true
    forbid-explicit-octal: true
"""
    ]
  }
]

# Run `uv lock` and `uv sync`.
[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.11.14"
hooks = [
  {
    id = "uv-sync",
    args = [
      "--all-extras"
    ]
  }
]

# Format and lint Python with Ruff.
[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.15"
hooks = [
  {
    id = "ruff-check",
    args = [
      "--fix-only",
      "--show-fixes"
    ]
  },
  {
    id = "ruff-format"
  }
]

# Format `justfile`.
[[repos]]
repo = "local"
hooks = [
  {
    id = "format-justfile",
    name = "Format the justfile using 'just --fmt'.",
    entry = "just --fmt --unstable",
    pass_filenames = false,
    language = "system",
    files = "justfile"
  }
]

# Format and auto-fix various files with Biome.
[[repos]]
repo = "https://github.com/biomejs/pre-commit"
rev = "v2.4.16"  # biomejs/pre-commit only uses tags, not releases.
hooks = [
  # "check" hook: auto-format and auto-fix
  {
    id = "biome-check",
    args = [
      "--vcs-enabled=false"
    ]
  },
  # "format" hook: format (manual only)
  {
    id = "biome-format",
    args = [
      "--vcs-enabled=false"
    ],
    stages = [
      "manual"
    ]
  },
  # "lint" hook: auto-fix (manual only)
  {
    id = "biome-lint",
    args = [
      "--vcs-enabled=false"
    ],
    stages = [
      "manual"
    ]
  },
  # "ci" hook: show but don't apply changes (manual only)
  {
    id = "biome-ci",
    args = [
      "--error-on-warnings",
      "--vcs-enabled=false"
    ],
    stages = [
      "manual"
    ]
  }
]

# Check Markdown links (manual only).
[[repos]]
repo = "https://github.com/tcort/markdown-link-check"
rev = "v3.14.2"
hooks = [
  {
    id = "markdown-link-check",
    args = [
      "--quiet"
    ],
    stages = [
      "manual"
    ]
  }
]
