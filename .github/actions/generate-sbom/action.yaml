name: generate-sbom
description: >-
  Writes a SBOM and list of licenses.

inputs:
  ref:
    default: ""
    description: A branch or tag ref; defaults to github.head_ref then to github.ref.
  retention-days:
    default: "1"
    description: >-
      Non-negative integer.
      If > 0, uploads the zip file as GitHub artifact 'dist-<REF>' with this expiration.

outputs:
  ref-name:
    description: The ref name (provided for convenience).
    value: ${{ steps.define.outputs.ref-name }}
  artifact-name:
    description: The artifact name.
    value: ${{ steps.define.outputs.artifact-name }}
  artifact-id:
    description: The artifact id.
    value: ${{ steps.upload.outputs.artifact-id }}
  artifact-url:
    description: The artifact URL.
    value: ${{ steps.upload.outputs.artifact-url }}
  artifact-digest:
    description: The artifact digest.
    value: ${{ steps.upload.outputs.artifact-digest }}

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        if [[ ! '${{ inputs.retention-days }}' =~ ^[1-9][0-9]*$ ]]; then
          printf >&2 \
            "retention-days is not a positive int: '%s'.\n" \
            '${{ inputs.retention-days }}'
          exit 2
        fi
    - id: define
      shell: bash
      run: |
        # Assume branch and tag names can't overlap.
        ref='${{ inputs.ref || github.head_ref || github.ref }}'
        ref_name="$ref"
        ref_name="${ref_name#refs/heads/}"
        ref_name="${ref_name#refs/tags/}"
        echo "ref=$ref" >> "$GITHUB_OUTPUT"
        echo "ref-name=$ref_name" >> "$GITHUB_OUTPUT"
        echo "artifact-name=dist-$ref_name" >> "$GITHUB_OUTPUT"
    - uses: actions/checkout@v6
      with:
        ref: ${{ steps.define.outputs.ref }}
    - uses: astral-sh/setup-uv@v8.1.0
    - name: Run pip-licenses
      shell: bash
      run: |
        uv tool install pip-licenses
        uv sync --no-dev --all-extras
        pip-licenses \
          --python .venv/Scripts/python \
          --format json \
          --output-file licenses.json
    - name: Upload artifact '${{ steps.define.outputs.artifact_name }}'
      id: upload
      uses: actions/upload-artifact@v6
      with:
        name: ${{ steps.define.outputs.artifact_name }}
        path: licenses.json
        if-no-files-found: error
        overwrite: true
        retention-days: ${{ inputs.retention-days }}
    - name: Print artifact info
      shell: bash
      run: |
        printf "Uploaded artifact '%s': '%s'.\n" \
          '${{ steps.define.outputs.artifact_name }}' \
          '${{ steps.upload.outputs }}'
