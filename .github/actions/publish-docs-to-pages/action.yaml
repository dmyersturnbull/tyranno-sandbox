name: publish-docs-to-pages
description: >-
  Builds docs and publishes them to GitHub Pages.
  The GitHub context should be a tag but can be a branch.
  Needs permissions: 'contents: write', 'pages: write'.

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
    - shell: bash
      run: |
        uv sync --locked --only-group docs
        uv run --no-sync zensical build
    # Note that in v4, dot files are excluded, with no way to override.
    # This is apparently by design.
    # https://github.com/actions/upload-pages-artifact/issues/129
    - uses: actions/upload-pages-artifact@v4
      with:
        path: site
    - uses: actions/deploy-pages@v4
