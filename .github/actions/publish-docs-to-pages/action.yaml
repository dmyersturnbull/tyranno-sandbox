name: publish-docs-to-pages
description: >-
  Builds docs and publishes them to GitHub Pages.
  The GitHub context should be a tag but can be a branch.
  Needs permissions: 'contents: write', 'id-token: write', 'pages: write'.

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v8.1.0
    - shell: bash
      run: |
        uv sync --locked --only-group docs
        uv run --no-sync zensical build
    - uses: actions/upload-pages-artifact@v5
      with:
        path: site
    - uses: actions/deploy-pages@v5
