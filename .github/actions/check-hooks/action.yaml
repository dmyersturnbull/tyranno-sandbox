name: check-hooks
description: Runs basic prek hooks.
inputs:
  ref:
    default: ""
    description: A branch or tag ref; defaults to github.head_ref then to github.ref.

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref || github.head_ref || github.ref }}
    - uses: astral-sh/setup-uv@v8.1.0
    - name: Sync and confirm lock file is up-to-date
      shell: bash
      run: |
        uv sync --frozen --only-group git-hooks
    - uses: extractions/setup-just@v4
    - name: Run prek hooks
      shell: bash
      run: |
        just check-core
