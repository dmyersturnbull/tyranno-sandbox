name: publish-to-pypi
description: >-
  Publishes to PyPi or test PyPi.
  The GitHub context MUST be a tag.
  Needs permissions: 'contents: read'.
  Needs the appropriate secret: 'PYPI_TOKEN' or 'TESTPYPI_TOKEN'.

inputs:
  upload-to:
    required: true
    description: Either 'pypi' or 'testpypi'.

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        if [[ ! '${{ inputs.upload-to }}' =~ '^(?:pypi|testpypi)$' ]]; then
          printf >&2 \
            "upload-to is not in (pypi|testpypi): '%s'.\n" \
            '${{ inputs.upload-to }}'
          exit 2
        fi
    - id: define
      shell: bash
      run: |
        # Define `ref_name` and `artifact_name`.
        ref_name=${{ github.ref }}
        if [[ ! "$ref_name" =~ ^refs/tags/ ]]; then
          printf >&2 "Ref is not a tag: '%s'.\n" "$ref_name"
          exit 2
        fi
        ref_name="${ref_name#refs/tags/}"
        echo "ref_name=$ref_name" >> "$GITHUB_OUTPUT"
        echo "artifact_name=dist-$ref_name" >> "$GITHUB_OUTPUT"
        #######################################################################
        # Define `repo` and `token`.
        repo=${{ inputs.upload-to }}
        if [[ "$repo" == pypi ]]; then
          repo=https://upload.pypi.org/legacy/
          token='${{ secrets.PYPI_TOKEN }}' 2> /dev/null
        elif [[ "$repo" == testpypi ]]; then
          repo=https://test.pypi.org/legacy/
          token='${{ secrets.TESTPYPI_TOKEN }}' 2> /dev/null
        fi
        echo "repo=$repo" >> "$GITHUB_OUTPUT"
        echo "token="$token" >> "$GITHUB_OUTPUT" 2> /dev/null
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.ref }}
    - uses: astral-sh/setup-uv@v7
    - name: Download artifact ${{ steps.define.outputs.artifact_name }}
      uses: actions/download-artifact@v7
      with:
        name: ${{ steps.define.outputs.artifact_name }}
    - name: Publish to ${{ inputs.upload-to }} using uv.
      # See: https://docs.pypi.org/trusted-publishers/adding-a-publisher/
      env:
        UV_PUBLISH_URL: ${{ steps.define.outputs.repo }}
        UV_PUBLISH_TOKEN: ${{ steps.define.outputs.token }}
      shell: bash
      run: |
        uv publish --trusted-publishing always
        printf "Published to %s.\n" '${{ inputs.upload-to }}'
