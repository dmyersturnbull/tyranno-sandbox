name: do-auto-format
description: Auto-fixes issues and auto-formats, committing the changes.

inputs:
  ref:
    required: true
    description: The ref, which must be a branch if 'push' is true.
  compare-to-ref:
    description: >-
      Only reformat files that differ from this ref.
      If empty, runs on all files.
      For a PR, this is probably the base commit.
  push:
    default: ""
    description: >-
      Push changes; otherwise, errors if there were changes.
      Literal 'true' or ''.
  ruff-fix-git-subject:
    description: Git commit subject for auto-lint.
    default: "refactor: auto-lint"
  ruff-format-git-subject:
    description: Git commit subject for auto-format.
    default: "style: auto-format"

outputs:
  auto-fix:
    description: >-
      'true' if lint rule violations were fixed; '' otherwise.
    value: ${{ steps.auto-fix.outputs.changed }}
  auto-format:
    description: >-
      'true' if formatting changes were made; '' otherwise.
    value: ${{ steps.auto-format.outputs.changed }}

runs:
  using: composite
  steps:
    # ====================
    # 0. Validate args.
    - name: Validate inputs
      shell: bash
      run: |
        if [[ ! '${{ inputs.push }}' =~ ^(?:true)?$ ]]; then
          printf >&2 "ERROR: push is not true|'': '%s'.\n" '${{ inputs.push }}'
          exit 2
        fi
    # ====================
    # 1. Set up.
    - name: Configure Git
      shell: bash
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
    # ====================
    # 2. Fetch refs.
    - name: Fetch the HEAD commit
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
    - if: ${{ inputs.compare-to-ref }}
      name: Fetch base commit for comparison
      # If we need to compare against another ref, we'll need to fetch that, too.
      shell: bash
      run: |
        git fetch --no-tags --depth=1 origin '${{ inputs.compare-to-ref }}'
    - uses: astral-sh/setup-uv@v8.1.0
    - shell: bash
      run: |
        uv sync --locked --only-group git-hooks
    - name: Sanity-check that there are no local changes
      shell: bash
      run: |
        if [[ -n "$(git status --porcelain --untracked-files=no)" ]]; then
          printf >&2 "\n\nERROR: Non-empty diff! (((\n%b\n)))\n\n" "$(git diff --histogram)"
          exit 1
        fi
    # ====================
    # 2. Auto-fix.
    - name: Auto-fix lint rule violations.
      id: auto-fix
      shell: bash
      env:
        FROM: ${{ inputs.compare-to-ref }}
        TO: ${{ inputs.ref }}
        SUBJECT: ${{ inputs.auto-fix-git-subject }}
      run: |
        if [[ -z $FROM ]]; then
          uv run --no-sync pre-commit run ruff-check --all-files || true
          uv run --no-sync pre-commit run biome-lint --all-files || true
        else
          uv run --no-sync pre-commit run ruff-check --from-ref $FROM --to-ref $TO || true
          uv run --no-sync pre-commit run biome-lint --from-ref $FROM --to-ref $TO || true
        fi
        if [[ -n "$(git status --porcelain --untracked-files=no)" ]]; then
          git diff --histogram # Show in logs.
          echo "changed=true" >> $GITHUB_OUTPUT
          git add --update
          git commit -m "$SUBJECT"
        fi
    # ====================
    # 3. Auto-format.
    - name: Auto-format
      id: auto-format
      shell: bash
      env:
        FROM: ${{ inputs.compare-to-ref }}
        TO: ${{ inputs.ref }}
        SUBJECT: ${{ inputs.auto-format-git-subject }}
      run: |
        if [[ -z $FROM ]]; then
          uv run --no-sync pre-commit run ruff-format --all-files || true
          uv run --no-sync pre-commit run biome-format --all-files || true
          uv run --no-sync pre-commit run format-justfile --all-files || true
        else
          uv run --no-sync pre-commit run ruff-format --from-ref $FROM --to-ref $TO || true
          uv run --no-sync pre-commit run biome-format --from-ref $FROM --to-ref $TO || true
          uv run --no-sync pre-commit run format-justfile --from-ref $FROM --to-ref $TO || true
        fi
        if [[ -n "$(git status --porcelain --untracked-files=no)" ]]; then
          git diff --histogram # Show in logs.
          echo "changed=true" >> $GITHUB_OUTPUT
          git add --update
          git commit -m "$SUBJECT"
        fi
    # ====================
    # 4. Push changes.
    - if: ${{ steps.auto-fix.outputs.changed || steps.auto-format.outputs.changed }}
      name: ${{ inputs.push && 'Push' || 'Note' }} changes
      shell: bash
      run: |
        untracked="$(git ls-files --others --exclude-standard)"
        if [[ -n "$untracked" ]]; then
          printf >&2 "\n\nERROR: Found unexpected untracked files! (((\n%s\n)))\n\n" "$untracked"
          exit 1
        elif [[ '${{ inputs.push }}' ]]; then
          # NOTE: Let it fail if another commit was added!
          git push
          printf "Success. No changes needed.\n"
        else
          printf "Failure. Changes are needed, as shown above.\n"
          exit 1
        fi
